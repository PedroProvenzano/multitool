name: Deploy a GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar API keys
        run: |
          echo "OWM_KEY=${{ secrets.OWM_KEY }}" > .env

      - name: Build
        run: node build.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy a Pages
        uses: actions/deploy-pages@v4
